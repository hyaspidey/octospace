<!DOCTYPE html>
<html>
<head>
  <title>Octo Space</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
    }

    /* TOP HUD */
    .hud {
      width: 400px;
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 14px;
      color: white;
    }

    .hud span {
      opacity: 0.9;
    }

    canvas {
      background: black;
      border: 2px solid #333;
    }

    h1 {
      color: cyan;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1> Octo Space</h1>

<!-- HUD (outside game) -->
<div class="hud">
  <span id="score">Score: 0</span>
  <span id="high">High: 0</span>
  <span id="cval">C0</span>
</div>

<canvas id="game" width="400" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// HUD elements
const scoreEl = document.getElementById("score");
const highEl = document.getElementById("high");
const cEl = document.getElementById("cval");

// STATE
let ship, bullets, enemies;
let keys = {};
let gameOver = false;

let score = 0;
let highScore = Number(localStorage.getItem("highScore")) || 0;

let shootCooldown = 0;
let enemyTimer = 0;
let cCount = 0;

// restart system
let spacePressCount = 0;
let spacePressed = false;

// INIT
function init() {
  ship = {
    x: 200,
    y: 450,
    size: 10
  };

  bullets = [];
  enemies = [];

  gameOver = false;
  score = 0;
  shootCooldown = 0;
  enemyTimer = 0;
  cCount = 0;
  spacePressCount = 0;
}

init();

// INPUT
document.addEventListener("keydown", (e) => {
  keys[e.key] = true;

  if (e.key.toLowerCase() === "c" && !gameOver) {
    enemies = [];
    cCount++;
  }

  if (e.key === " ") {
    if (!spacePressed) {
      spacePressed = true;

      if (!gameOver) {
        if (shootCooldown <= 0) {
          shoot();
          shootCooldown = 12;
        }
      } else {
        spacePressCount++;
        if (spacePressCount >= 3) init();
      }
    }
  }
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
  if (e.key === " ") spacePressed = false;
});

// SHOOT
function shoot() {
  bullets.push({
    x: ship.x,
    y: ship.y - ship.size,
    w: 2,
    h: 6,
    speed: 7
  });
}

// COLLISION
function hit(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + (a.w || a.size) > b.x &&
    a.y < b.y + b.h &&
    a.y + (a.h || a.size) > b.y
  );
}

// DRAW SHIP
function drawShip() {
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.moveTo(ship.x, ship.y - ship.size);
  ctx.lineTo(ship.x - ship.size, ship.y + ship.size);
  ctx.lineTo(ship.x + ship.size, ship.y + ship.size);
  ctx.closePath();
  ctx.fill();
}

// UPDATE HUD
function updateHUD() {
  scoreEl.textContent = "Score: " + score;
  highEl.textContent = "High: " + highScore;
  cEl.textContent = "C" + cCount;
}

// UPDATE GAME
function update() {
  if (!gameOver) {

    if (keys["ArrowLeft"]) ship.x -= 4;
    if (keys["ArrowRight"]) ship.x += 4;

    ship.x = Math.max(20, Math.min(canvas.width - 20, ship.x));

    if (keys[" "] && shootCooldown <= 0) {
      shoot();
      shootCooldown = 12;
    }
    if (shootCooldown > 0) shootCooldown--;

    bullets.forEach(b => b.y -= b.speed);
    bullets = bullets.filter(b => b.y > -20);

    enemyTimer++;
    if (enemyTimer > 65) {
      let size = 20 + Math.random() * 40;

      enemies.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        w: size,
        h: size,
        speed: 0.8 + Math.random() * 0.6
      });

      enemyTimer = 0;
    }

    enemies.forEach(e => e.y += e.speed);

    bullets.forEach(b => {
      enemies.forEach(e => {
        if (hit(b, e)) {
          e.y = -200;
          b.y = -200;
          score++;
        }
      });
    });

    enemies = enemies.filter(e => e.y < canvas.height + 60);

    for (let e of enemies) {
      if (hit(ship, e) || e.y + e.h >= canvas.height) {
        gameOver = true;

        if (score > highScore) {
          highScore = score;
          localStorage.setItem("highScore", highScore);
        }
      }
    }

  }
}

// DRAW
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawShip();

  ctx.fillStyle = "white";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

  ctx.fillStyle = "hotpink";
  enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("GAME OVER", 120, 250);

    ctx.font = "14px Arial";
    ctx.fillText("Press SPACE 3 times to restart. ", 80, 280);
    ctx.fillText("cheat : press c",140,300);
  }
}

// LOOP
function loop() {
  update();
  draw();
  updateHUD();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
